<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="/lib/daisyui/daisyui.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/lib/daisyui/daisyui.min.js"></script>
    <title>Hide Jobs</title>
  </head>

  <body class="default-size h-screen flex justify-center items-center bg-gray-100">
    <div class="card card-dash bg-base-100 shadow-xl w-100">
      <div class="card-body text-center">
        <!-- Add text align center to the card items-->
        <h2 class="card-title justify-center">Hide Jobs</h2>

        <div class="w-full max-w-md mx-auto p-4">
          <label id="tags-label" class="block text-sm font-medium text-gray-700 mb-1">Jobs post to hide:</label>
          <!-- Allow clicking container to focus input -->
          <div
            id="tag-container"
            class="flex flex-wrap items-center gap-2 p-2 border border-gray-300 rounded-md focus-within:border-indigo-700 focus-within:ring-1 focus-within:ring-indigo-700"
            onclick="this.querySelector('input').focus()"
          >
            <!-- Chips will be dynamically inserted here -->
            <input
              type="text"
              id="tag-input"
              class="flex-grow bg-transparent border-none outline-none p-1 text-sm"
              placeholder="Type and press Space..."
              aria-labelledby="tags-label"
              autocomplete="off"
            />
          </div>
          <!-- Hidden input to store tags for form submission (optional) -->
          <input type="hidden" name="tags" id="tags-hidden-input" />
        </div>

        <!--  -->

        <!-- Center the card -->
        <!-- <ul class="">
          <p>Company Jobs to Hide:</p>
          <li class="font-bold">Bairesdev</li>
          <li class="font-bold">AgileEngine</li>
        </ul> -->
        <div>
          <p>Extension enabled:</p>
        </div>
        <div class="card-actions justify-center">
          <label class="swap bg-primary text-white">
            <input type="checkbox" id="btn-toggle" />
            <div class="swap-on p-1">ON</div>
            <div class="swap-off p-1">OFF</div>
          </label>
          <!-- <button class="btn btn-primary">Accept</button> -->
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
